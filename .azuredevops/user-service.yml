trigger:
  branches:
    include:
      - master
  paths:
    include:
      - src/VirtualNovel.UserService/**

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: virtualnovel-users
  dockerfilePath: src/VirtualNovel.UserService/Dockerfile

steps:
  - checkout: self

  - task: Docker@2
    displayName: Build and push UserService image
    inputs:
      command: buildAndPush
      containerRegistry: virtualnovel-acr
      repository: $(imageRepository)
      dockerfile: $(dockerfilePath)
      buildContext: $(Build.SourcesDirectory)
      tags: |
        $(Build.BuildId)
        latest
