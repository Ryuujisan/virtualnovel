name: virtualnovel

services:
  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-virtualnovel}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-virtualnovel_dev}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  users:
    image: virtualnovel/users:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: src/VirtualNovel.UserService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__Database: ${DATABASE_CONNECTION_STRING:?Set DATABASE_CONNECTION_STRING in .env}
      Firebase__ProjectId: ${FIREBASE_PROJECT_ID:-demo-virtualnovel}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  novels:
    image: virtualnovel/novels:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: src/VirtualNovel.NovelService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__Database: ${DATABASE_CONNECTION_STRING:?Set DATABASE_CONNECTION_STRING in .env}
      Firebase__ProjectId: ${FIREBASE_PROJECT_ID:-demo-virtualnovel}
      Services__UserService: http://users:8080/
    depends_on:
      users:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  images:
    image: virtualnovel/images:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: src/VirtualNovel.ImageService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      Firebase__ProjectId: ${FIREBASE_PROJECT_ID:-demo-virtualnovel}
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME:-}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY:-}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET:-}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  gateway:
    image: virtualnovel/gateway:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: src/VirtualNovel.Gateway/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      Firebase__ProjectId: ${FIREBASE_PROJECT_ID:-demo-virtualnovel}
      Cors__AllowedOrigins__0: http://localhost:5173
      ReverseProxy__Clusters__users-cluster__Destinations__destination1__Address: http://users:8080/
      ReverseProxy__Clusters__novels-cluster__Destinations__destination1__Address: http://novels:8080/
      ReverseProxy__Clusters__images-cluster__Destinations__destination1__Address: http://images:8080/
    depends_on:
      users:
        condition: service_healthy
      novels:
        condition: service_healthy
      images:
        condition: service_healthy
    ports:
      - "5181:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  frontend:
    image: virtualnovel/frontend:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: src/VirtualNovel.Frontend/Dockerfile
    restart: unless-stopped
    environment:
      GATEWAY_URL: http://gateway:8080
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "5173:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  rabbitmq-data:
