services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: virtualnovel-rabbitmq
    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: virtualnovel
      RABBITMQ_DEFAULT_PASS: virtualnovel_dev

    ports:
      - "5672:5672"
      - "15672:15672"

    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  rabbitmq-data: